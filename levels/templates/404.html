{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Appel Workshop</title>
    <link rel="icon" href="{% static 'icon.png' %}" type="image/png">
    <style>
        :root {
            --sky: #78c9ff;
            --sun: #ffe485;
            --grass: #85d58a;
            --deep: #1f2d3d;
            --card: rgba(255, 255, 255, 0.88);
            --shadow: rgba(31, 45, 61, 0.22);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--deep);
            background:
                radial-gradient(circle at 90% 12%, var(--sun) 0 10%, transparent 11%),
                radial-gradient(circle at 20% -10%, #ffffff 0 25%, transparent 26%),
                linear-gradient(180deg, #d8f2ff 0%, var(--sky) 38%, #b2e4ff 57%, var(--grass) 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            border-radius: 24px;
            padding: 34px 30px;
            background: var(--card);
            backdrop-filter: blur(3px);
            box-shadow: 0 18px 45px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: drop-in .45s ease-out;
        }

        .code {
            margin: 0;
            font-size: clamp(58px, 16vw, 130px);
            letter-spacing: 0.06em;
            line-height: 0.85;
            text-shadow: 0 5px 16px rgba(47, 118, 206, 0.25);
        }

        h1 {
            margin: 10px 0 8px;
            font-size: clamp(24px, 4vw, 36px);
        }

        p {
            margin: 0 auto;
            max-width: 560px;
            font-size: 18px;
            line-height: 1.45;
            opacity: 0.92;
        }

        .actions {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            border-radius: 999px;
            padding: 11px 18px;
            font-weight: 700;
            border: 2px solid transparent;
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .btn-primary {
            background: #ff9f45;
            color: #1d2229;
            box-shadow: 0 8px 18px rgba(255, 159, 69, 0.3);
        }

        .btn-secondary {
            background: #fff;
            color: #1d2229;
            border-color: rgba(29, 34, 41, 0.16);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        @keyframes drop-in {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="code">404</p>
        <h1>That level has wandered off the map</h1>
        <p>
            The page you requested does not exist. It may have been moved,
            renamed, or never uploaded.
        </p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Back To Home</a>
            <a class="btn btn-secondary" href="/list/">Browse Levels</a>
        </div>
    </main>
</body>
</html>
