{% extends 'base.html' %}

{% block content %}
  <h2>Delete Level: {{ level.name }}</h2>
  <p>Are you sure you want to delete this level?</p>
  <form method="POST">
    {% csrf_token %}
    <button type="submit">Confirm Delete</button>
  </form>
  <a href="{% url 'levels:level_detail' level.id %}">Cancel</a>
{% endblock %}
