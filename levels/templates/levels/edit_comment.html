{% extends "base.html" %}


{% block title %}Edit Comment{% endblock %}

{% block content %}

<!-- templates/edit_comment.html -->
<h2>Edit Comment</h2>
{% if comment_error %}
<p class="text-danger">{{ comment_error }}</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    <textarea name="content" rows="4">{{ comment_content|default:comment.content }}</textarea>
    <br>
    <button type="submit">Update Comment</button>
</form>
<a href="{% url 'levels:level_detail' comment.level.id %}">Cancel</a>
{% endblock %}
